# Set the default terminal to a modern one that supports 256 colors
set -g default-terminal "screen-256color"

# Enable RGB color capabilities (true color) and proper font support
set-option -sa terminal-overrides ",xterm-256color:RGB"
set-option -ga terminal-overrides ",screen-256color:Tc"

# Force UTF-8 in status bar

set -g mouse on

unbind r
bind r source-file ~/.tmux.conf

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g status-position top

# Tmux Plugin Manager path
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.tmux/plugins"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'

set -g @plugin 'catppuccin/tmux' # See https://github.com/catppuccin/tmux/tags for additional tags

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"

set -g allow-rename off
set -g automatic-rename off
# Automatically restore tmux environment when tmux is started
set -g @continuum-restore 'on'
set-hook -g after-new-session 'run-shell "sleep 0.5 && tmux source ~/.tmux.conf"'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
